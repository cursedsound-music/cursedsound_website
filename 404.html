<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 | CURSEDSOUND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #060606;
        --white: #ede8df;
        --red: #a30000;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #1a0000 0, #060606 55%);
        color: var(--white);
        font-family: 'Unbounded', sans-serif;
        padding: 2rem;
      }
      .card {
        width: min(640px, 100%);
        border: 1px solid rgba(237, 232, 223, 0.22);
        padding: 2rem;
        background: rgba(6, 6, 6, 0.72);
        backdrop-filter: blur(2px);
      }
      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(2rem, 8vw, 4rem);
        letter-spacing: 0.08em;
      }
      p {
        margin: 0 0 1.2rem;
        line-height: 1.8;
        color: rgba(237, 232, 223, 0.72);
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: var(--white);
        border: 1px solid rgba(237, 232, 223, 0.4);
        padding: 0.8rem 1.1rem;
        text-transform: uppercase;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
      }
      a:hover {
        border-color: var(--red);
        background: var(--red);
      }
      a:focus-visible {
        outline: 2px solid #c40000;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404</h1>
      <p>
        This page slipped into the shadows. The requested URL could not be found.
      </p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
